server.port=8088
spring.datasource.url=jdbc:mysql://localhost:3306/notification_db
spring.datasource.username=root
spring.datasource.password=root
info.app.name=Notification Service
info.app.description=Manages notifications and alerts
info.app.version=1.0.0
# Notification Service Circuit Breaker
resilience4j.circuitbreaker.instances.notificationService.sliding-window-size=5
resilience4j.circuitbreaker.instances.notificationService.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.notificationService.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.instances.notificationService.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.notificationService.register-health-indicator=true

# Notification Service Retry
resilience4j.retry.instances.notificationService.max-attempts=3
resilience4j.retry.instances.notificationService.wait-duration=2s
resilience4j.retry.instances.notificationService.retry-exceptions=java.io.IOException,feign.FeignException
